name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  php-lint:
    name: "PHP Lint (PHP ${{ matrix.php-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.0', '8.1', '8.2']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}

      - name: Lint every theme PHP file
        run: |
          set -e
          status=0
          while IFS= read -r -d '' file; do
            if ! php -l "$file" > /tmp/lint_out 2>&1; then
              echo "::error file=$file::$(cat /tmp/lint_out)"
              status=1
            fi
          done < <(find theme-src/nuvirahub -name '*.php' -print0)
          exit $status

  build-zip:
    name: Build theme zip
    needs: php-lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build dist/nuvirahub.zip
        run: |
          mkdir -p dist
          cd theme-src
          zip -rq ../dist/nuvirahub.zip nuvirahub -x "*.DS_Store"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuvirahub-theme
          path: dist/nuvirahub.zip
          retention-days: 30
